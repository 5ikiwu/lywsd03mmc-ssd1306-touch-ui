<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" role="img" aria-labelledby="title desc">
  <title id="title">OLED UI preview</title>
  <desc id="desc">Monochrome preview of the SSD1306 UI pages for temperature, humidity, battery, and menu navigation.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f4; }
      .device { fill: #16181d; stroke: #2f343c; stroke-width: 3; }
      .screen { fill: #080d14; stroke: #384b60; stroke-width: 2; }
      .pixel { fill: #e7fbff; font-family: Consolas, monospace; }
      .muted { fill: #86a8b7; font-family: Consolas, monospace; }
      .line { stroke: #e7fbff; stroke-width: 3; }
      .soft { stroke: #86a8b7; stroke-width: 2; }
      .tag { fill: #202124; font-family: Arial, sans-serif; font-size: 16px; }
    </style>
  </defs>
  <rect class="bg" width="640" height="260"/>

  <rect class="device" x="36" y="42" width="270" height="176" rx="20"/>
  <rect class="screen" x="58" y="64" width="226" height="132" rx="6"/>
  <text class="muted" x="76" y="90" font-size="14">ROOM</text>
  <text class="pixel" x="76" y="144" font-size="48">23.6</text>
  <text class="pixel" x="220" y="145" font-size="20">C</text>
  <line class="soft" x1="76" y1="158" x2="266" y2="158"/>
  <text class="pixel" x="76" y="180" font-size="18">45% RH</text>
  <text class="muted" x="204" y="180" font-size="18">BAT 88</text>

  <rect class="device" x="334" y="42" width="270" height="176" rx="20"/>
  <rect class="screen" x="356" y="64" width="226" height="132" rx="6"/>
  <text class="muted" x="374" y="90" font-size="14">MENU</text>
  <line class="line" x1="374" y1="108" x2="562" y2="108"/>
  <text class="pixel" x="374" y="134" font-size="18">&gt; Sensors</text>
  <text class="muted" x="374" y="158" font-size="18">  Battery</text>
  <text class="muted" x="374" y="182" font-size="18">  BLE status</text>

  <text class="tag" x="74" y="236">Main reading page</text>
  <text class="tag" x="372" y="236">Touch-navigated menu page</text>
</svg>
